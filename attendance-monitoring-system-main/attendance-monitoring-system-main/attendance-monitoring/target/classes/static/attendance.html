<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance Monitoring</title>

    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
        }

        .header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        video{
            width:100%;
            max-width:600px;
            border-radius:10px;
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px 18px;
            border-radius:6px;
            cursor:pointer;
            margin-top:15px;
            margin-right:10px;
        }

        .status-bar{
            margin-top:20px;
            padding:15px;
            background:#198754;
            color:white;
            border-radius:8px;
            font-weight:bold;
        }

        .student-card{
            margin-top:20px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

<div class="header">
    <h1>Attendance Monitoring System</h1>
    <p>Face Recognition Attendance</p>
</div>

<div class="container">

    <div class="card">

        <h2>Live Camera</h2>
        <br>

        <video id="video" autoplay></video>

        <img id="capturedImage"
     style="display:none;
            width:100%;
            max-width:600px;
            border-radius:10px;">

        <canvas id="canvas"
                width="600"
                height="450"
                style="display:none;">
        </canvas>

        <br>

        <button onclick="startCamera()">
            Start Camera
        </button>

        <button onclick="markAttendance()">
            Mark Attendance
        </button>

        <div class="status-bar" id="statusBar">
            Status: Ready
        </div>

    </div>

    <div class="student-card">

        <h2>Recognized Student</h2>
        <br>

        <p id="studentInfo">
            No student recognized yet.
        </p>

    </div>

</div>

<script>


let allFaceData = [];

function updateStatus(message, color = "#198754") {
    const statusBar = document.getElementById("statusBar");
    statusBar.innerText = "Status: " + message;
    statusBar.style.background = color;
}

async function startCamera() {

    const video = document.getElementById("video");
    const capturedImage = document.getElementById("capturedImage");

    capturedImage.style.display = "none";
    video.style.display = "block";

    const stream = await navigator.mediaDevices.getUserMedia({
        video: true
    });

    video.srcObject = stream;

    updateStatus("Camera Started", "#0d6efd");
}

async function loadModels() {

    await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
    await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
    await faceapi.nets.faceRecognitionNet.loadFromUri('/models');

    console.log("Models Loaded");
}

async function loadFaceData() {

    const response = await fetch("/face-data");
    allFaceData = await response.json();

    console.log("Face Data Loaded");
}

function euclideanDistance(arr1, arr2) {

    let sum = 0;

    for (let i = 0; i < arr1.length; i++) {
        sum += Math.pow(arr1[i] - arr2[i], 2);
    }

    return Math.sqrt(sum);
}

async function markAttendance() {

    const video = document.getElementById("video");

    if (!video.srcObject) {

        updateStatus(
            "Please start camera first",
            "#dc3545"
        );

        return;
    }

    const canvas = document.getElementById("canvas");

    const context = canvas.getContext("2d");

    context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const capturedImageData =
        canvas.toDataURL("image/png");

    const capturedImage =
        document.getElementById("capturedImage");

    capturedImage.src = capturedImageData;

    const detection = await faceapi
        .detectSingleFace(
            canvas,
            new faceapi.TinyFaceDetectorOptions()
        )
        .withFaceLandmarks()
        .withFaceDescriptor();

    if (!detection) {

        updateStatus(
            "No Face Detected",
            "#dc3545"
        );

        return;
    }

    const descriptorArray =
        Array.from(detection.descriptor);

    let matchedStudentId = null;
    let bestDistance = Number.MAX_VALUE;

    for (const faceData of allFaceData) {

        const storedDescriptor =
            JSON.parse(faceData.descriptor);

        const distance =
            euclideanDistance(
                descriptorArray,
                storedDescriptor
            );

        if (
            distance < bestDistance &&
            faceData.studentId != null
        ) {
            bestDistance = distance;
            matchedStudentId =
                faceData.studentId;
        }
    }

    console.log("Best Distance:", bestDistance);
    console.log("Matched Student:", matchedStudentId);

    if (
        matchedStudentId &&
        bestDistance < 0.45
    ) {

        const attendanceResponse =
            await fetch(
                `/attendance/${matchedStudentId}`,
                {
                    method: "POST"
                }
            );

        const attendanceData =
            await attendanceResponse.json();

        const studentResponse =
            await fetch(
                `/students/${matchedStudentId}`
            );

        const student =
            await studentResponse.json();

       if (
    attendanceData.status ===
    "ALREADY_LOGGED_OUT"
) {

    document.getElementById(
        "studentInfo"
    ).innerHTML = `
        <strong>USN:</strong> ${student.usn}<br><br>
        <strong>Name:</strong> ${student.name}<br><br>
        <strong>Department:</strong> ${student.department}<br><br>
        <strong>Email:</strong> ${student.email}<br><br>

        <div style="
            background:#fff3cd;
            color:#856404;
            padding:10px;
            border-radius:6px;
            font-weight:bold;
            margin-top:10px;">
            Already Logged Out Today
        </div>
    `;

    updateStatus(
        "Already Logged Out Today",
        "#fd7e14"
    );

}
else if (
    attendanceData.logoutTime != null
) {

    document.getElementById(
        "studentInfo"
    ).innerHTML = `
        <strong>USN:</strong> ${student.usn}<br><br>
        <strong>Name:</strong> ${student.name}<br><br>
        <strong>Department:</strong> ${student.department}<br><br>
        <strong>Email:</strong> ${student.email}<br><br>

        <strong>Login Time:</strong>
${new Date(attendanceData.loginTime).toLocaleString()}<br><br><br><br>

        <strong>Logout Time:</strong>
     ${new Date(attendanceData.logoutTime).toLocaleString()}<br><br>

        <div style="
            background:#cfe2ff;
            color:#084298;
            padding:10px;
            border-radius:6px;
            font-weight:bold;
            margin-top:10px;">
            Logout Recorded Successfully
        </div>
    `;

    updateStatus(
        "Logout Recorded",
        "#0d6efd"
    );

}
else {
    document.getElementById(
        "studentInfo"
    ).innerHTML = `
        <strong>USN:</strong> ${student.usn}<br><br>
        <strong>Name:</strong> ${student.name}<br><br>
        <strong>Department:</strong> ${student.department}<br><br>
        <strong>Email:</strong> ${student.email}<br><br>

        <strong>Login Time:</strong>
        ${attendanceData.loginTime}<br><br>

        <div style="
            background:#d4edda;
            color:#155724;
            padding:10px;
            border-radius:6px;
            font-weight:bold;
            margin-top:10px;">
            Login Recorded Successfully
        </div>
    `;
    updateStatus(
        "Login Recorded",
        "#198754"
    );
}

        video.style.display = "none";
        capturedImage.style.display = "block";

        if (video.srcObject) {

            video.srcObject
                .getTracks()
                .forEach(track => track.stop());

            video.srcObject = null;
        }

    } else {

        updateStatus(
            "Face Not Recognized",
            "#dc3545"
        );
    }
}

window.onload = async () => {

    await loadModels();

    await loadFaceData();

    updateStatus(
        "System Ready",
        "#198754"
    );
};
</script>

</body>
</html>
