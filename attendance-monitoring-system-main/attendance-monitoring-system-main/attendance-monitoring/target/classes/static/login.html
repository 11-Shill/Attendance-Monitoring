<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lecturer Login</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            width:350px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#0d6efd;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        #message{
            margin-top:15px;
            text-align:center;
            color:red;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Lecturer Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <div id="message"></div>

</div>

<script>

function login() {

    const username =
        document.getElementById(
            "username"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;

    if(
        username === "lecturer"
        &&
        password === "lecturer123"
    ){

        sessionStorage.setItem(
            "loggedIn",
            "true"
        );

        window.location.href =
            "dashboard.html";

    } else {

        document.getElementById(
            "message"
        ).innerText =
            "Invalid Username or Password";
    }
}

</script>

</body>
</html>
