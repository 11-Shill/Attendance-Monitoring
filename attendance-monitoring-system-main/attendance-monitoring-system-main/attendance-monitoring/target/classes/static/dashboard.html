<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
        }

        .header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
    position:relative;
}

        .container{
            padding:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
            text-align:center;
        }

        .card h2{
            color:#0d6efd;
            margin-bottom:15px;
        }

        .number{
            font-size:40px;
            font-weight:bold;
        }

        .links{
            margin-top:30px;
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        .links a{
            text-decoration:none;
            background:#0d6efd;
            color:white;
            padding:12px 20px;
            border-radius:6px;
        }

    </style>
  <button onclick="logout()"
style="
position:absolute;
right:20px;
top:20px;
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;">
Logout
</button>
</button>

</head>

<body>

<div class="header">

    <h1>
        Attendance Monitoring Dashboard
    </h1>

    <button
        onclick="logout()"
        style="
            position:absolute;
            top:20px;
            right:20px;
            background:red;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:6px;
            cursor:pointer;
        ">
        Logout
    </button>

</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>Total Students</h2>
            <div class="number" id="totalStudents">0</div>
        </div>

        <div class="card">
            <h2>Total Attendance Records</h2>
            <div class="number" id="totalAttendance">0</div>
        </div>

        <div class="card">
    <h2>Present Today</h2>
    <div class="number" id="presentToday">0</div>
</div>

<div class="card">
    <h2>Defaulters</h2>
    <div class="number" id="defaulters">0</div>
</div>

    </div>
    

  <div class="links">


    <a href="student-registration.html">
        Student Registration
    </a>

    <a href="students.html">
        Students
    </a>


    <a href="attendance-records.html">
        Attendance Records
    </a>

    <a href="reports.html">
        Reports
    </a>

</div>

    </div>

</div>

<script>
    if(
    sessionStorage.getItem(
        "loggedIn"
    ) !== "true"
){
    window.location.href =
        "login.html";
}

async function loadDashboard() {

    const studentResponse =
        await fetch("/students");

    const students =
        await studentResponse.json();

    const attendanceResponse =
        await fetch("/attendance");

    const attendance =
        await attendanceResponse.json();

    document.getElementById(
        "totalStudents"
    ).innerText =
        students.length;

    document.getElementById(
        "totalAttendance"
    ).innerText =
        attendance.length;

    const today =
        new Date()
            .toISOString()
            .split("T")[0];

    const presentToday =
        attendance.filter(
            record =>
                record.attendanceDate === today
        ).length;

    document.getElementById(
        "presentToday"
    ).innerText =
        presentToday;

    const attendanceCountMap = {};

    attendance.forEach(record => {

        if (!attendanceCountMap[record.studentId]) {

            attendanceCountMap[
                record.studentId
            ] = 0;
        }

        attendanceCountMap[
            record.studentId
        ]++;
    });

    const uniqueDates = [
        ...new Set(
            attendance.map(
                record =>
                    record.attendanceDate
            )
        )
    ];

    const totalWorkingDays =
        uniqueDates.length || 1;

    let defaulters = 0;

    students.forEach(student => {

        const count =
            attendanceCountMap[
                student.id
            ] || 0;

        const percentage =
            (count / totalWorkingDays)
            * 100;

        if (percentage < 75) {

            defaulters++;
        }
    });

    document.getElementById(
        "defaulters"
    ).innerText =
        defaulters;
}
function logout(){

    sessionStorage.clear();

    window.location.href =
        "login.html";
}

</script>

</body>
</html>
