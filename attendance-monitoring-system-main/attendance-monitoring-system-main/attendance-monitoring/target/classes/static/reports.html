<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Attendance Reports</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f6f9;
        }

        .header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th{
            background:#0d6efd;
            color:white;
            padding:12px;
            text-align:left;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        .regular{
            color:green;
            font-weight:bold;
        }

        .defaulter{
            color:red;
            font-weight:bold;
        }

        tr:hover{
            background:#f1f1f1;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>Attendance Reports</h1>
</div>

<div class="container">

    <div class="card">

        <table>

            <thead>
     <tr>
    <th>USN</th>
    <th>Name</th>
    <th>Department</th>
    <th>Attendance Count</th>
    <th>Attendance %</th>
    <th>Status</th>
</tr>
            </thead>

            <tbody id="reportBody">
            </tbody>

        </table>

    </div>

</div>

<script>

if (
    sessionStorage.getItem("loggedIn") !== "true"
) {
    window.location.href = "login.html";
}

async function loadReports() {

    const studentResponse =
        await fetch("/students");

    const students =
        await studentResponse.json();

    const attendanceResponse =
        await fetch("/attendance");

    const attendance =
        await attendanceResponse.json();

    const reportBody =
        document.getElementById("reportBody");

    reportBody.innerHTML = "";

    const attendanceCountMap = {};

    attendance.forEach(record => {

        if (!attendanceCountMap[record.studentId]) {

            attendanceCountMap[
                record.studentId
            ] = 0;
        }

        attendanceCountMap[
            record.studentId
        ]++;
    });

    const uniqueDates = [
        ...new Set(
            attendance.map(
                record =>
                    record.attendanceDate
            )
        )
    ];

    const totalWorkingDays =
        uniqueDates.length || 1;

    students.forEach(student => {

        const count =
            attendanceCountMap[
                student.id
            ] || 0;

        const percentage =
            (
                (count / totalWorkingDays)
                * 100
            ).toFixed(2);

        const status =
            percentage >= 75
                ? "Regular"
                : "Defaulter";

        const statusClass =
            percentage >= 75
                ? "regular"
                : "defaulter";

        reportBody.innerHTML += `
            <tr>
                <td>${student.usn}</td>
                <td>${student.name}</td>
                <td>${student.department}</td>
                <td>${count}</td>
                <td>${percentage}%</td>
                <td class="${statusClass}">
                    ${status}
                </td>
            </tr>
        `;
    });
}

window.onload = loadReports;

</script>

</body>
</html>
